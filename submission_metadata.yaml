  - "ChatGPT"
  - "Codex"

ai_usage_summary: |
  Used AI tools for planning, implementation support, debugging, refactoring, and documentation.
  The ranking step itself is deterministic local Python code with no hosted API calls during execution.

methodology_summary: |
  SignalRank AI uses an evidence-first deterministic ranking pipeline for the Senior AI Engineer role.
  Static fit is scored from career evidence, retrieval/ranking signals, evaluation terms, production ML context,
  experience, location, and education. Redrob behavior signals apply a narrow hireability multiplier, while
  trap and honeypot-style penalties reduce keyword-stuffed or inconsistent profiles. Final reasoning is generated
  deterministically from extracted evidence and scorecards.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
